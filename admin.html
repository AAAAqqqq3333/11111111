<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>XPost Core Admin</title>
  <style>
    :root{--bg:#070A12;--stroke:rgba(255,255,255,.16);--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.65)}
    html,body{margin:0;background:
      radial-gradient(900px 600px at 15% 0%, rgba(180,0,255,.22), transparent 55%),
      radial-gradient(900px 600px at 100% 0%, rgba(0,229,255,.18), transparent 55%),
      var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;}
    .wrap{max-width:1100px;margin:0 auto;padding:16px;}
    h1{margin:6px 0 14px;font-size:20px;letter-spacing:.02em;text-shadow:0 0 18px rgba(0,229,255,.18);}
    h2{margin:0 0 10px;font-size:16px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid var(--stroke); border-radius:16px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.35); backdrop-filter: blur(10px);}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:900px){.grid{grid-template-columns:1fr;}}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px;}
    input,select,textarea{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.20);
      background:rgba(0,0,0,.25); color:var(--text); font-size:14px;}
    textarea{min-height:110px;resize:vertical;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.18);
      background:linear-gradient(135deg, rgba(0,229,255,.22), rgba(180,0,255,.16));
      color:var(--text); cursor:pointer; box-shadow:0 0 24px rgba(0,229,255,.12);}
    button.secondary{background:rgba(255,255,255,.08); box-shadow:none;}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06); color:var(--muted); font-size:12px;}
    .status{position:sticky;top:10px;z-index:5;margin-bottom:12px}
    #toast{display:none}
    #toast.show{display:flex}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid rgba(255,255,255,.10);padding:8px 6px;font-size:13px;vertical-align:top}
    th{color:rgba(255,255,255,.75);text-align:left}
    .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .muted{color:var(--muted);font-size:12px}
    #debugBar{position:fixed;left:12px;right:12px;bottom:12px;z-index:999999;padding:10px 12px}
    #dbgLog{margin-top:8px;font-size:12px;white-space:pre-wrap;max-height:22vh;overflow:auto;opacity:.9}
  </style>
</head>
<body>
<div class="wrap">
  <div class="status">
    <div id="toast" class="card" style="padding:10px 12px;">
      <span class="pill" id="toastType">INFO</span>
      <span id="toastMsg" class="mono"></span>
    </div>
  </div>

  <h1>XPost Core 管理画面</h1>

  <div class="card">
    <div class="row">
      <div style="flex:1;min-width:260px">
        <label>API Base（あなたのWorker）</label>
        <input id="base" class="mono" placeholder="https://xpost-core.****.workers.dev" />
      </div>
      <div style="flex:1;min-width:260px">
        <label>ADMIN TOKEN</label>
        <input id="token" class="mono" placeholder="XPCORE_..." />
      </div>
      <div style="margin-top:26px">
        <button class="secondary" id="save">保存</button>
      </div>
    </div>
    <div class="muted">※ 保存すると、このブラウザの localStorage に保持します。</div>
  </div>

  <div style="height:12px"></div>

  <div class="grid">
    <div class="card">
      <h2>キー操作</h2>
      <label>ライセンスキー（XXXX-XXXX-XXXX-XXXX）</label>
      <input id="key" class="mono" placeholder="ABCD-EFGH-IJKL-MNOP" />
      <div class="row" style="margin-top:10px">
        <button id="lookup">照会</button>
        <button id="reset" class="secondary">端末リセット</button>
        <button id="revoke" class="secondary">失効</button>
      </div>
      <label style="margin-top:14px">結果</label>
      <textarea id="opResult" class="mono" readonly></textarea>
    </div>

    <div class="card">
      <h2>発行（30/90/180日）</h2>
      <label>新規キー</label>
      <input id="newKey" class="mono" placeholder="空でもOK（自動生成します）" />
      <label>有効日数</label>
      <select id="days">
        <option value="30">30</option>
        <option value="90">90</option>
        <option value="180">180</option>
      </select>
      <div class="row" style="margin-top:10px">
        <button id="genKey" class="secondary">自動生成</button>
        <button id="create">作成</button>
      </div>
      <label style="margin-top:14px">結果</label>
      <textarea id="createResult" class="mono" readonly></textarea>
    </div>
  </div>

  <div style="height:12px"></div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <h2>キー一覧</h2>
      <button id="refreshList" class="secondary">更新</button>
    </div>
    <div class="scroll" style="margin-top:10px">
      <table id="listTable">
        <thead><tr><th>キー</th><th>状態</th><th>期限（JST）</th><th>端末ID</th><th>最終チェック（JST）</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="muted" id="listMeta" style="margin-top:8px"></div>
  </div>

  <div style="height:12px"></div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <h2>ログ</h2>
      <button id="refreshLogs" class="secondary">更新</button>
    </div>
    <div class="scroll" style="margin-top:10px">
      <table id="logTable">
        <thead><tr><th>時刻（JST）</th><th>種別</th><th>キー</th><th>端末</th><th>詳細</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="muted" id="logMeta" style="margin-top:8px"></div>
  </div>
</div>

<div id="debugBar" class="card">
  <div class="row" style="justify-content:space-between;gap:8px">
    <span class="pill">DEBUG</span>
    <span id="dbgState" class="mono" style="font-size:12px;opacity:.9">js: booting...</span>
    <button id="dbgHide" class="secondary" style="padding:6px 10px;border-radius:999px">隠す</button>
  </div>
  <div id="dbgLog" class="mono">-</div>
</div>

<script>
  const LS_BASE="xpc_admin_base";
  const LS_TOKEN="xpc_admin_token";
  const $ = (id)=>document.getElementById(id);

  function dbg(msg){
    try{
      const s = $('dbgState');
      const l = $('dbgLog');
      if(s) s.textContent = 'js: running / ' + new Date().toISOString();
      if(l){
        if(l.textContent==='-') l.textContent='';
        l.textContent += msg + '\n';
        l.scrollTop = l.scrollHeight;
      }
    }catch(_){}
  }
  window.addEventListener('error', (e)=>dbg('ERROR: '+(e.message||e.type)));
  window.addEventListener('unhandledrejection', (e)=>dbg('PROMISE: '+(e.reason && (e.reason.message||String(e.reason)))));
  document.addEventListener('click', (e)=>{ const t=e.target; if(t && t.id) dbg('click: #'+t.id); }, true);

  function toast(type, msg){
    const t=$('toast'), tt=$('toastType'), tm=$('toastMsg');
    tt.textContent = type;
    tm.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t=setTimeout(()=>t.classList.remove('show'), 2600);
  }

  function genLicenseKey(){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    function part(){ let s=""; for(let i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)]; return s; }
    return `${part()}-${part()}-${part()}-${part()}`;
  }

  function getCfg(){
    const base = ($('base').value||'').trim().replace(/\/$/,'');
    const token = ($('token').value||'').trim();
    return { base, token };
  }
  function saveCfg(){
    const {base, token}=getCfg();
    localStorage.setItem(LS_BASE, base);
    localStorage.setItem(LS_TOKEN, token);
    toast('OK', '保存しました');
  }
  function loadCfg(){
    $('base').value = localStorage.getItem(LS_BASE) || 'https://xpost-core.ssssqqqq255.workers.dev';
    $('token').value = localStorage.getItem(LS_TOKEN) || '';
  }
  function fmtJST(iso){
    if(!iso) return '';
    try{
      const d = new Date(iso);
      return new Intl.DateTimeFormat('ja-JP', {timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(d);
    }catch(e){ return String(iso); }
  }

  async function api(path, {method='GET', body}={}){
    const {base, token} = getCfg();
    if(!base) throw new Error('API Baseが空です');
    if(!token) throw new Error('ADMIN TOKENが空です');
    const url = base + path;
    const init = { method, headers: { 'Authorization': 'Bearer ' + token } };
    if(body !== undefined){
      init.headers['Content-Type']='application/json';
      init.body = JSON.stringify(body);
    }
    dbg('fetch: ' + method + ' ' + url);
    const res = await fetch(url, init);
    const text = await res.text();
    let data = {};
    try{ data = JSON.parse(text); }catch{ data = { raw:text }; }
    dbg('resp: ' + res.status + ' ' + text.slice(0,200));
    if(!res.ok || data.ok === false){
      const msg = data.message || data.raw || ('HTTP ' + res.status);
      throw new Error(msg);
    }
    return data;
  }

  async function wrap(fn){
    try{ await fn(); }
    catch(e){ toast('ERR', e.message || String(e)); }
  }

  function bindTap(id, fn){
    const el = $(id);
    if(!el){ dbg('missing: '+id); return; }
    const h = (ev)=>{ try{ ev.preventDefault(); ev.stopPropagation(); }catch(_){}
      wrap(fn);
    };
    el.addEventListener('pointerup', h);
    el.addEventListener('touchend', h);
    el.addEventListener('click', h);
    dbg('bind: '+id);
  }

  async function doLookup(){
    const key = ($('key').value||'').trim().toUpperCase();
    if(!key){ toast('WARN','キーが空'); return; }
    toast('...', '照会中');
    const data = await api('/admin/lookup', {method:'POST', body:{key}});
    $('opResult').value = JSON.stringify(data, null, 2);
    toast('OK','照会 完了');
  }
  async function doReset(){
    const key = ($('key').value||'').trim().toUpperCase();
    if(!key){ toast('WARN','キーが空'); return; }
    toast('...', '端末リセット中');
    const data = await api('/admin/reset-device', {method:'POST', body:{key}});
    $('opResult').value = JSON.stringify(data, null, 2);
    toast('OK','端末リセット 完了');
  }
  async function doRevoke(){
    const key = ($('key').value||'').trim().toUpperCase();
    if(!key){ toast('WARN','キーが空'); return; }
    toast('...', '失効中');
    const data = await api('/admin/revoke', {method:'POST', body:{key}});
    $('opResult').value = JSON.stringify(data, null, 2);
    toast('OK','失効 完了');
  }
  async function doCreate(){
    let key = ($('newKey').value||'').trim().toUpperCase();
    const validDays = parseInt(($('days').value||'30'),10);
    if(!key){
      key = genLicenseKey();
      $('newKey').value = key;
      toast('INFO','キーを自動生成しました');
    }
    toast('...', `作成中（${validDays}日）`);
    const data = await api('/admin/create', {method:'POST', body:{key, validDays}});
    $('createResult').value = JSON.stringify(data, null, 2);
    toast('OK','作成 完了');
  }
  async function refreshList(){
    toast('...', '一覧更新中');
    const data = await api('/admin/list?limit=200');
    const rows = (data.items || []);
    const tb = $('listTable').querySelector('tbody');
    tb.innerHTML='';
    for(const r of rows){
      const tr=document.createElement('tr');
      const expires = r.expires_at || r.expiresAt || '';
      const last = r.last_seen_at || r.lastSeenAt || '';
      tr.innerHTML = `
        <td class="mono">${(r.key||'').slice(0,4)}-****-****-${(r.key||'').slice(-4)}</td>
        <td>${r.revoked ? 'revoked':'active'}</td>
        <td>${fmtJST(expires)}</td>
        <td class="mono">${(r.device_id||r.deviceId||'') || '-'}</td>
        <td>${fmtJST(last)}</td>
      `;
      tb.appendChild(tr);
    }
    $('listMeta').textContent = `件数: ${rows.length} / 最終更新: ${fmtJST(new Date().toISOString())}`;
    toast('OK','一覧 更新');
  }
  async function refreshLogs(){
    toast('...', 'ログ更新中');
    const data = await api('/admin/logs?limit=200');
    const rows = (data.items || []);
    const tb = $('logTable').querySelector('tbody');
    tb.innerHTML='';
    for(const r of rows){
      const tr=document.createElement('tr');
      tr.innerHTML = `
        <td>${fmtJST(r.at||'')}</td>
        <td>${r.type||'-'}</td>
        <td class="mono">${r.key ? (r.key.slice(0,4)+'-****-****-'+r.key.slice(-4)) : '-'}</td>
        <td class="mono">${r.device_id || '-'}</td>
        <td class="mono">${r.detail || ''}</td>
      `;
      tb.appendChild(tr);
    }
    $('logMeta').textContent = `件数: ${rows.length} / 最終更新: ${fmtJST(new Date().toISOString())}`;
    toast('OK','ログ 更新');
  }

  function bind(){
    bindTap('save', async()=>{ saveCfg(); });
    bindTap('lookup', doLookup);
    bindTap('reset', doReset);
    bindTap('revoke', doRevoke);
    bindTap('genKey', async()=>{ $('newKey').value = genLicenseKey(); toast('OK','キー自動生成'); });
    bindTap('create', doCreate);
    bindTap('refreshList', refreshList);
    bindTap('refreshLogs', refreshLogs);
    const hide = $('dbgHide');
    if(hide){ hide.addEventListener('click', ()=>{ $('debugBar').style.display='none'; }); }
    dbg('bind done');
  }

  loadCfg();
  bind();
  dbg('boot ok');
</script>
</body>
</html>
